name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['packages/sentry-testkit--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    # Must match the environment configured in the npm trusted publisher
    # settings for this package, or the OIDC token exchange is rejected
    environment: npm_deploy
    permissions:
      contents: read
      # Required for npm trusted publishing (OIDC):
      # https://docs.npmjs.com/trusted-publishers
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing requires npm >= 11.5.1; Node 22 bundles npm 10
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn workspace sentry-testkit build

      - name: Test
        run: yarn workspace sentry-testkit test

      # npm CLI (not yarn) so OIDC authentication and provenance are used;
      # no token needed — auth comes from the trusted publisher configuration
      - name: Publish to npm
        working-directory: ./packages/sentry-testkit
        run: npm publish --access public
